apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: guestbook
  namespace: application
  finalizers:
  - resources-finalizer.argocd.argoproj.io

spec:
  destination:
    namespace: applications
    server: https://kubernetes.default.svc
  project: default
  source:
    path: frontend
    repoURL: https://github.com/Titrox/argo-examples/app-of-apps
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      createNamespace: true