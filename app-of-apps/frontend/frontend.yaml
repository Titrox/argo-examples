apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Titrox/argo-examples
    targetRevision: HEAD
    path: helm-webapp
    helm:
      values: |
        appName: frontend
        configmap:
          name: frontend-configmap-v1
          data:
            CUSTOM_HEADER: 'Frontend service'
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
